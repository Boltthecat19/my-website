<body>
 <!-- Site navigation - keep this identical on every page -->
 <nav id="nav">
    <!-- logo links back home -->

 <main>
    <section id="contact">
       <h1><i class="fa-solid fa-envelope"></i> Request Early Access</h1>
       <p>BOLTT is rolling out to a small group of early partners. Tell us a little about your setup and we'll reach out when a slot opens up.</p>

       <!-- Contact form.-->
       <form class="contact-form" action="#" method="post">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required>

          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>

          <label for="org">Organization</label>
          <input type="text" id="org" name="org">

          <label for="message">What are you trying to take back control of?</label>
          <textarea id="message" name="message" rows="5"></textarea>

          <button type="submit" class="cta">Send Request <i class="fa-solid fa-paper-plane"></i></button>
       </form>
    </section>
 </main>
